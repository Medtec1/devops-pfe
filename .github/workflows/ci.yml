name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-html:
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le code du repo
        uses: actions/checkout@v5

      - name: Vérifier que index.html existe
        run: test -f index.html

      - name: Message succès
        run: echo "Pipeline OK" 

